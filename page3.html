<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试结果</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            padding: 20px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* 加载中 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #4d6a53;
        }

        /* 结果卡片 */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 30px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(77, 106, 83, 0.15);
            text-align: center;
        }

        .result-icon {
            width: 100px;
            height: 100px;
            border-radius: 0;
            margin-bottom: 16px;
            object-fit: contain;
            background-color: #fff;
        }

        .type-code {
            font-size: 48px;
            font-weight: 700;
            color: #4d6a53;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .type-name {
            font-size: 22px;
            font-weight: 600;
            color: #2e5e3e;
            margin-bottom: 16px;
        }

        .match-rate {
            display: inline-block;
            background: linear-gradient(135deg, #6c8d71 0%, #4d6a53 100%);
            color: white;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
        }

        /* 标签 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .tag {
            font-size: 12px;
            color: #4d6a53;
            background: rgba(77, 106, 83, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* 描述区域 */
        .description {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(77, 106, 83, 0.1);
        }

        .description-title {
            font-size: 16px;
            font-weight: 600;
            color: #4d6a53;
            margin-bottom: 12px;
        }

        .description-text {
            font-size: 15px;
            color: #3a5a3f;
            line-height: 1.7;
        }

        /* 维度评分 */
        .dimensions {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(77, 106, 83, 0.1);
        }

        .dimensions-title {
            font-size: 16px;
            font-weight: 600;
            color: #4d6a53;
            margin-bottom: 20px;
        }

        .dimension-item {
            margin-bottom: 16px;
        }

        .dimension-item:last-child {
            margin-bottom: 0;
        }

        .dimension-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .dimension-name {
            font-size: 14px;
            color: #3a5a3f;
        }

        .dimension-value {
            font-size: 14px;
            font-weight: 600;
            color: #4d6a53;
        }

        .dimension-bar {
            height: 8px;
            background: #e8f0ea;
            border-radius: 4px;
            overflow: hidden;
        }

        .dimension-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c8d71 0%, #4d6a53 100%);
            border-radius: 4px;
        }

        /* 底部按钮 */
        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: white;
            color: #4d6a53;
            font-size: 15px;
            font-weight: 500;
            border: 2px solid #4d6a53;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #4d6a53;
            color: white;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #6c8d71 0%, #4d6a53 100%);
            color: white;
            border: none;
        }

        .nav-btn.primary:hover {
            opacity: 0.9;
        }

        /* 匹配度详情 */
        .match-detail {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        .radar-chart {
            max-width: 320px;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="resultContainer">
        <div class="loading">正在计算结果...</div>
    </div>

    <script>
        // 计算档位差值得分
        function getLevelScore(userLevel, patternLevel) {
            if (userLevel === patternLevel) return 3; // 完全匹配
            const levels = ['低', '中', '高'];
            const userIdx = levels.indexOf(userLevel);
            const patternIdx = levels.indexOf(patternLevel);
            const diff = Math.abs(userIdx - patternIdx);
            if (diff === 1) return 2; // 差1档
            return 1; // 差2档
        }

        // 计算两个档位数组的相似度
        function calculateSimilarity(userLevels, patternLevels) {
            let score = 0;
            for (const dim in userLevels) {
                if (patternLevels[dim]) {
                    score += getLevelScore(userLevels[dim], patternLevels[dim]);
                }
            }
            return score;
        }

        // 主函数
        async function showResult() {
            try {
                // 获取测试结果
                const testResult = JSON.parse(sessionStorage.getItem('testResult'));
                if (!testResult) {
                    document.getElementById('resultContainer').innerHTML = '<div class="loading">没有找到测试结果，请先完成测试</div>';
                    return;
                }

                const { dimensionLevels, dimensionScores } = testResult;

                // 加载人格数据和模式
                const [personasRes, patternsRes] = await Promise.all([
                    fetch('data.json?t=' + Date.now()),
                    fetch('patterns.json?t=' + Date.now())
                ]);

                const personas = await personasRes.json();
                const patterns = await patternsRes.json();

                // 找出最匹配的人格
                let bestMatch = null;
                let bestScore = 0;

                patterns.patterns.forEach(p => {
                    const score = calculateSimilarity(dimensionLevels, p.dimensions);
                    if (score > bestScore) {
                        bestScore = score;
                        bestMatch = p;
                    }
                });

                // 查找完整的人格信息
                const personaInfo = personas.personalities.find(p => p.code === bestMatch.code);

                // 计算匹配度百分比
                const maxScore = 8 * 3; // 8个维度，最高3分
                const matchPercent = Math.round((bestScore / maxScore) * 100);

                // 调试：获取所有匹配分数用于显示
                const allMatches = patterns.patterns.map(p => ({
                    name: p.name,
                    code: p.code,
                    score: calculateSimilarity(dimensionLevels, p.dimensions)
                })).sort((a, b) => b.score - a.score);

                console.log('用户维度档位:', dimensionLevels);
                console.log('所有匹配:', allMatches);

                // 渲染结果
                renderResult(personaInfo, bestMatch, dimensionLevels, dimensionScores, matchPercent, allMatches);

            } catch (error) {
                console.error('计算结果失败:', error);
                document.getElementById('resultContainer').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }

        // 渲染雷达图
        function renderRadarChart(dimensionScores) {
            const ctx = document.getElementById('radarChart').getContext('2d');

            const labels = Object.keys(dimensionScores);
            const data = Object.values(dimensionScores);

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '你的八维',
                        data: data,
                        fill: true,
                        backgroundColor: 'rgba(77, 106, 83, 0.2)',
                        borderColor: '#4d6a53',
                        pointBackgroundColor: '#4d6a53',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#4d6a53',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        r: {
                            min: 2,
                            max: 9,
                            ticks: {
                                stepSize: 1,
                                display: false
                            },
                            grid: {
                                color: 'rgba(77, 106, 83, 0.2)'
                            },
                            angleLines: {
                                color: 'rgba(77, 106, 83, 0.2)'
                            },
                            pointLabels: {
                                color: '#4d6a53',
                                font: {
                                    size: 11
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        // 渲染结果
        function renderResult(persona, pattern, userLevels, dimensionScores, matchPercent, allMatches) {
            const container = document.getElementById('resultContainer');

            // 计算各维度得分和条形图宽度
            const levelLabelMap = { '低': 'L', '中': 'M', '高': 'H' };
            const dimensionBars = Object.entries(dimensionScores).map(([name, score]) => {
                const percent = Math.max(10, ((score - 3) / 6) * 100);
                const level = userLevels[name];
                const label = levelLabelMap[level] || level;
                return { name, label, score, percent };
            }).map(d => `
                <div class="dimension-item">
                    <div class="dimension-header">
                        <span class="dimension-name">${d.name}</span>
                        <span class="dimension-value">${d.label} (${d.score}分)</span>
                    </div>
                    <div class="dimension-bar">
                        <div class="dimension-fill" style="width: ${d.percent}%"></div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <!-- 第一个框：人格结果 -->
                <div class="result-card">
                    <div style="font-size: 14px; color: #4d6a53; margin-bottom: 8px;">你的狼人杀人格类型是</div>
                    <div class="type-name" style="font-size: 26px;">${persona.name}</div>
                    <div class="type-code" style="font-size: 18px; margin-top: 4px; margin-bottom: 16px;">${persona.english}</div>
                    <img src="${persona.image}" alt="${persona.name}" class="result-icon" style="margin: 0 auto 12px;">
                    <div style="font-size: 15px; color: #3a5a3f; font-style: italic;">"${persona.tagline}"</div>
                </div>

                <!-- 第二个框：主类型 -->
                <div class="result-card">
                    <div style="font-size: 14px; color: #4d6a53; margin-bottom: 8px;">你的主类型</div>
                    <div style="font-size: 20px; color: #2e5e3e; font-weight: 600; margin-bottom: 12px;">${persona.english} ${persona.name}</div>
                    <div class="tags" style="margin-bottom: 12px;">
                        ${persona.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div class="match-rate" style="margin-bottom: 12px;">匹配度 ${matchPercent}%</div>
                    <div class="description-text">${persona.description}</div>
                </div>

                <!-- 第三个框：八维得分 -->
                <!-- 人格解读 -->
                <div class="description">
                    <div style="font-size: 14px; color: #2e5e3e; font-weight: 600; margin-bottom: 8px;">该人格的简单解读</div>
                    <div class="description-text">${persona.desc}</div>
                </div>

                <div class="dimensions">
                    <div class="dimensions-title">你的狼格八维</div>
                    <div class="radar-chart" style="margin-bottom: 20px;">
                        <canvas id="radarChart"></canvas>
                    </div>
                    ${dimensionBars}
                </div>

                <!-- 底部按钮 -->
                <div class="bottom-bar">
                    <a href="page2.html" class="nav-btn">重新测试</a>
                    <a href="index.html" class="nav-btn primary">返回首页</a>
                </div>
            `;

            // 渲染雷达图（使用实际分数）
            renderRadarChart(dimensionScores);
        }

        // 页面加载时显示结果
        showResult();
    </script>
</body>
</html>
