<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这是一个测试demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .title-box {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(77, 106, 83, 0.15);
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #2e5e3e;
            line-height: 1.4;
            margin-bottom: 12px;
            word-break: keep-all;
            text-align: center;
        }

        @media (max-width: 400px) {
            .title {
                font-size: 24px;
            }
        }

        .subtitle {
            font-size: 14px;
            color: #5a7a5e;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .start-btn {
            display: inline-block;
            width: 100%;
            max-width: 280px;
            padding: 16px 32px;
            background: linear-gradient(135deg, #6c8d71 0%, #4d6a53 100%);
            color: white;
            font-size: 18px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(77, 106, 83, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 106, 83, 0.4);
        }

        .author {
            margin-top: 24px;
            font-size: 14px;
            color: #5a7a5e;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="title-box">
            <h1 class="title">🐺测测你的狼人杀人格<br>我是悍跳戏精，你呢？</h1>
            <p class="subtitle">本狼人杀人格测试是主包为研究「vibe coding」，参考最近热门的 SBTI 创作的练习作品～ 若不慎涉及侵权，请及时联系主包删除，感谢理解！<br><br>测试仅供娱乐，希望能给狼人杀玩家带来快乐，祝大家每次悍跳都能成功～</p>
            <a href="page2.html" class="start-btn">开始测试</a>
            <p class="author">作者: @蛟川小盆友</p>
        </div>
    </div>
</body>
</html>
